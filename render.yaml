services:
  - type: web
    name: shadow-garden
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: test
      - key: SESSION_SECRET
        generateValue: true
