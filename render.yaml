services:
  - type: web
    name: shadow-garden
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: STAFF_PHONES
        sync: false
